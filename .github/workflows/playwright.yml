name: Playwright Tests

on:
  # push:
  #   branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # schedule:
  #   - cron: '10 16 * * *'
  schedule:
    - cron: '42 10 * * *'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5. Run Playwright tests and generate Allure results
      - name: Run Playwright Tests with Allure Reporter
        run: npx allure run -- npx playwright test

      # 6. Generate Allure report and post PR summary (if PR)
      - name: Run Allure Action
        uses: allure-framework/allure-action@v0
        with:
          results-directory: allure-results
          report-directory: allure-report
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 7. Upload report as artifact
      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-report
          path: allure-report
          retention-days: 30